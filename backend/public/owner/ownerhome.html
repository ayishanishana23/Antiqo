<!DOCTYPE html>
<html>
<head>
<title>Owner Dashboard - Antiqo</title>
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* HEADER */

header{
background:#070707;
border-bottom:1px solid #d4af37;
color:#d4af37;
padding:18px 60px;
display:flex;
align-items:center;
}

.logo img{
height:45px;
}

/* DASHBOARD LAYOUT */

.dashboard{
display:flex;
}

/* SIDEBAR (FIXED) */

.sidebar{
width:250px;
background:#070707;
padding:25px 15px;
display:flex;
flex-direction:column;
border-right:1px solid #1a1a1a;

position:fixed;
top:80px;
bottom:0;
left:0;
}

.sidebar button{
background:none;
border:none;
color:white;
padding:12px;
text-align:left;
cursor:pointer;
border-radius:6px;
margin-bottom:10px;
font-size:14px;
transition:0.2s;
}

.sidebar button:hover{
background:#d4af37;
color:black;
}

.sidebar button.active{
background:#d4af37;
color:black;
}

.sidebar .logout{
margin-top:auto;
background:#b22222;
color:white;
}

/* MAIN AREA */

.main-area{
flex:1;
margin-left:250px;
height:calc(100vh - 80px);
overflow-y:auto;
}

/* HERO BACKGROUND */

.hero-bg{
min-height:calc(100vh - 80px);
background:url("/images/antique-bg.jpg") no-repeat center/cover;
position:relative;
display:flex;
flex-direction:column;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
}

.content{
position:relative;
z-index:2;
padding:60px 80px;
}

/* STAT CARDS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
margin-bottom:40px;
}

.stat-card{
background:rgba(5,5,5,0.9);
border-left:4px solid #d4af37;
padding:20px;
border-radius:8px;
}

.stat-card h3{
font-size:28px;
color:#d4af37;
margin-bottom:5px;
}

.stat-card p{
font-size:13px;
opacity:0.8;
}

/* INFO BOX */

.section{
margin-top:20px;
}

.info-box{
background:rgba(0,0,0,0.65);
padding:25px;
border-radius:10px;
margin-bottom:25px;
border-left:4px solid #d4af37;
}

.info-box h2{
margin-bottom:10px;
color:#d4af37;
}

/* FOOTER */


</style>
</head>

<body>

<header>
<div class="logo">
<img src="/images/logo.png">
</div>
</header>
<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<button class="active" onclick="goHome(this)">🏠 Dashboard</button>
<button onclick="goMyAntiques(this)">📜 My Antiques</button>
<button onclick="goAddAntique(this)">➕ Add Antique</button>
<button onclick="goVerify(this)">✔ Verify Antique</button>
<button onclick="goOwnershipRequests(this)">🔁 Ownership Requests</button>
<button onclick="goProfile(this)">👤 Profile</button>
<button onclick="goSettings(this)">⚙ Settings</button>

<button class="logout" onclick="logout()">🚪 Logout</button>

</div>


<!-- MAIN AREA -->

<div class="main-area">

<div class="hero-bg">

<div class="overlay"></div>

<div class="content" id="mainContent">
</div>



</div>

</div>

</div>


<script>

window.token = localStorage.getItem("token");

if(!token){
window.location.href="/login.html";
}

/* SET ACTIVE MENU */

function setActive(btn){

const buttons=document.querySelectorAll(".sidebar button");

buttons.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

}


/* DASHBOARD HOME */

async function goHome(btn){

if(btn) setActive(btn);

let ownerName="Owner";

/* Example statistics */

let total=0;
let pending=0;
let approved=0;
let rejected=0;

try{

const res=await fetch("/api/auth/profile",{
headers:{Authorization:"Bearer "+token}
});

if(res.ok){

const user=await res.json();

ownerName=user.name || "Owner";

}

const antiqueRes=await fetch("/api/antique/my-antiques",{
headers:{Authorization:"Bearer "+token}
});

if(antiqueRes.ok){

const antiques=await antiqueRes.json();

total=antiques.length;

antiques.forEach(a=>{
if(a.status==="Pending") pending++;

if(a.status==="Approved") approved++;

if(a.status==="Rejected") rejected++;

});

}
    
}catch(err){
console.log(err);
}

document.getElementById("mainContent").innerHTML=`

<h1 style="color:#d4af37;">Welcome back, ${ownerName} 👋</h1>

<p style="margin-top:10px;opacity:0.8;">
Manage your antique collection, submit new items for verification,
and track authentication progress through the Antiqo blockchain platform.
</p>


<div class="stats">

<div class="stat-card">
<h3>${total}</h3>
<p>Total Antiques Submitted</p>
</div>

<div class="stat-card">
<h3>${pending}</h3>
<p>Pending Verification</p>
</div>

<div class="stat-card">
<h3>${approved}</h3>
<p>Approved Antiques</p>
</div>

<div class="stat-card">
<h3>${rejected}</h3>
<p>Rejected Requests</p>
</div>

</div>


<div class="section">

<div class="info-box">

<h2>Submit a New Antique</h2>

<p style="line-height:1.7;">
Register a new antique by providing detailed information,
historical background, and images for verification.

<br><br>

<span style="color:#d4af37;cursor:pointer;text-decoration:underline;"
onclick="goAddAntique(document.querySelector('.sidebar button:nth-child(3)'))">

Click here to add an antique

</span>

</p>

</div>


<div class="info-box">

<h2>Manage Your Collection</h2>

<p style="line-height:1.7;">
View antiques you have submitted and monitor
their verification status.

<br><br>

<span style="color:#d4af37;cursor:pointer;text-decoration:underline;"
onclick="goMyAntiques(document.querySelector('.sidebar button:nth-child(2)'))">

Click here to view your antiques

</span>

</p>

</div>


<div class="info-box">

<h2>Verify Antique Authenticity</h2>

<p style="line-height:1.7;">
Verify the authenticity of an antique registered in the Antiqo system.
You can check ownership history and certification details by entering
the antique ID or scanning the QR code associated with the item.

This feature ensures transparency and helps buyers or collectors
confirm that an antique is officially registered on the Antiqo
blockchain verification platform.

<br><br>

<span style="color:#d4af37;cursor:pointer;text-decoration:underline;"
onclick="goVerify(document.querySelector('.sidebar button:nth-child(4)'))">

Click here to verify an antique

</span>

</p>

</div>

</div>

`;

}


/* NAVIGATION */

async function goMyAntiques(btn){

if(btn) setActive(btn);

const res = await fetch("/owner/myAntiques.html");
const html = await res.text();

document.getElementById("mainContent").innerHTML = html;


const scripts = document
  .getElementById("mainContent")
  .querySelectorAll("script");

scripts.forEach(oldScript=>{
  const newScript = document.createElement("script");
  newScript.textContent = oldScript.textContent;
  document.body.appendChild(newScript);
});

loadAntiques();

}

async function goAddAntique(btn){

if(btn) setActive(btn);

const res = await fetch("/owner/addAntique.html");
const html = await res.text();

document.getElementById("mainContent").innerHTML = html;
const scripts = document
  .getElementById("mainContent")
  .querySelectorAll("script");

scripts.forEach(oldScript=>{
  const newScript = document.createElement("script");
  newScript.textContent = oldScript.textContent;
  document.body.appendChild(newScript);
});
}


async function goOwnershipRequests(btn){

if(btn) setActive(btn);

const res = await fetch("/owner/ownershipRequests.html");
const html = await res.text();

document.getElementById("mainContent").innerHTML = html;
const scripts = document
.getElementById("mainContent")
.querySelectorAll("script");

scripts.forEach(oldScript=>{
const newScript=document.createElement("script");
newScript.textContent=oldScript.textContent;
document.body.appendChild(newScript);
});

}


async function goVerify(btn){

if(btn) setActive(btn);

const res = await fetch("/owner/verifyAntique.html");
const html = await res.text();

document.getElementById("mainContent").innerHTML = html;
const scripts = document
.getElementById("mainContent")
.querySelectorAll("script");

scripts.forEach(oldScript=>{
const newScript=document.createElement("script");
newScript.textContent=oldScript.textContent;
document.body.appendChild(newScript);
});

}

async function goProfile(btn){

if(btn) setActive(btn);

const res = await fetch("/owner/profile.html");
const html = await res.text();

document.getElementById("mainContent").innerHTML = html;
const scripts = document
  .getElementById("mainContent")
  .querySelectorAll("script");

scripts.forEach(oldScript=>{
  const newScript = document.createElement("script");
  newScript.textContent = oldScript.textContent;
  document.body.appendChild(newScript);
});

}

async function goSettings(btn){

if(btn) setActive(btn);

const res = await fetch("/owner/settings.html");
const html = await res.text();

document.getElementById("mainContent").innerHTML = html;
const scripts = document
  .getElementById("mainContent")
  .querySelectorAll("script");

scripts.forEach(oldScript=>{
  const newScript = document.createElement("script");
  newScript.textContent = oldScript.textContent;
  document.body.appendChild(newScript);
});

}

/* LOGOUT */

function logout(){
localStorage.removeItem("token");
window.location.href="/login.html";
}

/* INITIAL LOAD */

goHome();

</script>


</body>
</html>
