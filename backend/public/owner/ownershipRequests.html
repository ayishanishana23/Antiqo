<!DOCTYPE html>
<html>

<head>
  <title> Ownership Requests - Antiqo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- QR Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

 <div class="info-box">
  <h2 style="color:#d4af37;">Ownership Requests Received</h2>
  <p style="opacity:0.8;margin-bottom:20px;">Approve or reject ownership requests sent by buyers.</p>

  <div id="ownerRequestList"></div>
</div>

<script>
async function loadOwnerRequests() {
  const token = localStorage.getItem("token");
  const container = document.getElementById("ownerRequestList");

  try {
    const res = await fetch("/api/antique/owner-requests", {
      headers: { Authorization: "Bearer " + token }
    });

    const requests = await res.json();

    if (!requests.length) {
      container.innerHTML = "<p>No pending ownership requests</p>";
      return;
    }

    container.innerHTML = requests.map(r => `
      <div style="background:#111;padding:20px;border-radius:8px;margin-bottom:15px;border-left:4px solid #d4af37;">
        <h3 style="color:#d4af37">${r.antique.name}</h3>
        <p><b>Serial ID:</b> ${r.antique.serialId}</p>
        <p><b>Buyer:</b> ${r.buyer.name} (${r.buyer.email})</p>
        <p><b>Requested On:</b> ${new Date(r.requestDate).toLocaleDateString()}</p>
        <p><b>Status:</b> ${r.status}</p>
        <button onclick="respondRequest('${r._id}', true)" style="margin-right:10px;padding:6px 12px;background:#4caf50;color:black;border:none;border-radius:4px;cursor:pointer;">Approve</button>
        <button onclick="respondRequest('${r._id}', false)" style="padding:6px 12px;background:#b22222;color:white;border:none;border-radius:4px;cursor:pointer;">Reject</button>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p>Failed to load requests</p>";
  }
}

async function respondRequest(requestId, approve) {
  if (!confirm(`Are you sure you want to ${approve ? "approve" : "reject"} this request?`)) return;

  const token = localStorage.getItem("token");

  try {
    const res = await fetch("/api/antique/ownership-request/owner-response", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token 
      },
      body: JSON.stringify({ requestId, approve })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message);

    alert(data.message);
    loadOwnerRequests(); // reload updated requests
  } catch (err) {
    console.error(err);
    alert("Failed to respond to request");
  }
}

// Load requests on page load
loadOwnerRequests();
</script>

</body>

</html>
