<!DOCTYPE html>
<html>

<head>
  <title>Buyer Dashboard - Antiqo</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
    body { background: #111; color: white; min-height: 100vh; overflow-x: hidden; }
    header { background: #070707; border-bottom: 1px solid #d4af37; color: #d4af37; padding: 18px 60px; display: flex; align-items: center; }
    .logo img { height: 45px; }
    .dashboard { display: flex; }
    .sidebar { width: 250px; background: #070707; padding: 25px 15px; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; position: fixed; top: 80px; bottom: 0; left: 0; }
    .sidebar button { background: none; border: none; color: white; padding: 12px; text-align: left; cursor: pointer; border-radius: 6px; margin-bottom: 10px; font-size: 14px; transition: 0.2s; }
    .sidebar button:hover { background: #d4af37; color: black; }
    .sidebar button.active { background: #d4af37; color: black; }
    .sidebar .logout { margin-top: auto; background: #b22222; color: white; }
    .main-area { flex: 1; margin-left: 250px; height: calc(100vh - 80px); overflow-y: auto; }
    .hero-bg { min-height: calc(100vh - 80px); background: url("/images/antique-bg.jpg") no-repeat center/cover; position: relative; display: flex; flex-direction: column; }
    .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(6px); }
    .content { position: relative; z-index: 2; padding: 60px 80px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; margin-bottom: 40px; }
    .stat-card { background: rgba(5, 5, 5, 0.9); border-left: 4px solid #d4af37; padding: 20px; border-radius: 8px; }
    .stat-card h3 { font-size: 28px; color: #d4af37; margin-bottom: 5px; }
    .stat-card p { font-size: 13px; opacity: 0.8; }
    .section { margin-top: 20px; }
    .info-box { background: rgba(0, 0, 0, 0.65); padding: 25px; border-radius: 10px; margin-bottom: 25px; border-left: 4px solid #d4af37; }
    .info-box h2 { margin-bottom: 10px; color: #d4af37; }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <img src="/images/logo.png">
    </div>
  </header>

  <div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="active" onclick="goHome(this)">🏠 Dashboard</button>
      <button onclick="goBrowseAntiques(this)">🛒 Browse Antiques</button>
      <button onclick="goMyAntiques(this)">📜 My Antiques</button>
      <button onclick="goVerify(this)">✔ Verify Antique</button>
      <button onclick="goOwnershipRequests(this)">🔁 Ownership Requests</button>
      <button onclick="goProfile(this)">👤 Profile</button>
      <button onclick="goSettings(this)">⚙ Settings</button>
      <button class="logout" onclick="logout()">🚪 Logout</button>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">
      <div class="hero-bg">
        <div class="overlay"></div>
        <div class="content" id="mainContent"></div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login.html";

    function setActive(btn) {
      document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    async function goHome(btn) {
      if (btn) setActive(btn);

      let buyerName = "Buyer";
      let totalOwned = 0, pendingRequests = 0, approvedRequests = 0, rejectedRequests = 0;

      try {
        // Get profile
        const profileRes = await fetch("/api/auth/profile", { headers: { Authorization: "Bearer " + token }});
        if (profileRes.ok) { const user = await profileRes.json(); buyerName = user.name || "Buyer"; }

        // Get ownership requests
        const reqRes = await fetch("/api/antique/ownership-requests", { headers: { Authorization: "Bearer " + token } });
        if (reqRes.ok) {
          const requests = await reqRes.json();
          requests.forEach(r => {
            if (r.status === "PendingOwner" || r.status ==="PendingAdmin") pendingRequests++;
            else if (r.status === "Approved") approvedRequests++;
            else if (r.status === "Rejected") rejectedRequests++;
          });
        }

        // Get owned antiques
        const antiquesRes = await fetch("/api/antique/my-antiques", { headers: { Authorization: "Bearer " + token } });
        if (antiquesRes.ok) { const antiques = await antiquesRes.json(); totalOwned = antiques.length; }

      } catch (err) { console.log(err); }

      document.getElementById("mainContent").innerHTML = `
        <h1 style="color:#d4af37;">Welcome back, ${buyerName} 👋</h1>
        <p style="margin-top:10px;opacity:0.8;">
          Browse antiques, verify authenticity, request ownership, and track your collections.
        </p>
        <div class="stats">
          <div class="stat-card"><h3>${totalOwned}</h3><p>Owned Antiques</p></div>
          <div class="stat-card"><h3>${pendingRequests}</h3><p>Pending Requests</p></div>
          <div class="stat-card"><h3>${approvedRequests}</h3><p>Approved Requests</p></div>
          <div class="stat-card"><h3>${rejectedRequests}</h3><p>Rejected Requests</p></div>
        </div>

        <div class="section">
          <div class="info-box">
            <h2>Browse Antiques</h2>
            <p>Explore verified antiques available for purchase. Click below to browse the collection.</p>
            <span style="color:#d4af37;cursor:pointer;text-decoration:underline;" onclick="goBrowseAntiques(document.querySelector('.sidebar button:nth-child(2)'))">
              Click here to browse antiques
            </span>
          </div>

          <div class="info-box">
            <h2>Verify Antique Authenticity</h2>
            <p>Verify the authenticity of an antique registered in the Antiqo system.
              You can check ownership history and certification details by entering the antique ID or scanning the QR code associated with the item.
              This feature ensures transparency and helps buyers or collectors confirm that an antique is officially registered on the Antiqo blockchain verification platform.
            </p>
            <span style="color:#d4af37;cursor:pointer;text-decoration:underline;" onclick="goVerify(document.querySelector('.sidebar button:nth-child(4)'))">
              Click here to verify an antique
            </span>
          </div>

          <div class="info-box">
            <h2>Ownership Requests</h2>
            <p>Track the status of ownership requests you have sent to owners.</p>
            <span style="color:#d4af37;cursor:pointer;text-decoration:underline;" onclick="goOwnershipRequests(document.querySelector('.sidebar button:nth-child(5)'))">
              Click here to view your requests
            </span>
          </div>

          <div class="info-box">
            <h2>Manage Your Collection</h2>
            <p style="line-height:1.7;">
              View antiques you have submitted and monitor their verification status.
              <br><br>
              <span style="color:#d4af37;cursor:pointer;text-decoration:underline;" onclick="goMyAntiques(document.querySelector('.sidebar button:nth-child(3)'))">
                Click here to view your antiques
              </span>
            </p>
          </div>

        </div>
      `;
    }

    async function loadPage(url) {
      const res = await fetch(url);
      const html = await res.text();
      const container = document.getElementById("mainContent");
      container.innerHTML = html;

      // Execute inline scripts
      container.querySelectorAll("script").forEach(s => {
        const ns = document.createElement("script");
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
      });
    }

    // Sidebar navigation
    const goBrowseAntiques = btn => { if (btn) setActive(btn); loadPage("/buyer/browse.html"); };
    const goMyAntiques = btn => { if (btn) setActive(btn); loadPage("/buyer/myAntiques.html"); };
    const goOwnershipRequests = btn => { if (btn) setActive(btn); loadPage("/buyer/ownership.html"); };
    const goVerify = btn => { if (btn) setActive(btn); loadPage("/buyer/verifyAntique.html"); };
    const goProfile = btn => { if (btn) setActive(btn); loadPage("/buyer/profile.html"); };
    const goSettings = btn => { if (btn) setActive(btn); loadPage("/buyer/settings.html"); };

    function logout() { localStorage.removeItem("token"); window.location.href = "/login.html"; }

    // Load dashboard home on page load
    goHome();
  </script>
</body>
</html>
