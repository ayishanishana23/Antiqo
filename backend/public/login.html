<!DOCTYPE html>
<html>

<head>
    <title>Login | Antiqo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: url("/images/antique-bg.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dark Overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* Glass Card */
        .login-container {
            position: relative;
            z-index: 2;
            width: 380px;
            padding: 40px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-align: center;
            color: white;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: #d4af37;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #d4af37;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #b8860b;
        }

        .bottom-links {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .bottom-links a {
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            white-space: nowrap;
        }

        .bottom-links a:hover {
            text-decoration: underline;
        }




        .back-link,
        .register-link {
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-link:hover,
        .register-link:hover {
            text-decoration: underline;
        }


        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2> Antiqo</h2>

        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <div class="bottom-links">
            <a href="/" class="back-link">Back to Home</a>
            <a href="/register.html" class="register-link">Register</a>
        </div>

    </div>

    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Please fill all fields");
                return;
            }

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.message || "Login failed");
                    return;
                }

                // ✅ Save token
                localStorage.setItem("token", data.token);
                localStorage.setItem("role", data.role);
                localStorage.setItem("userId", data.userId);


                alert("Login Successful");

                // ✅ ROLE BASED REDIRECT
                if (data.role === "Admin") {
                    window.location.href = "/admin/adminhome.html";
                }
                else if (data.role === "Owner") {
                    window.location.href = "/owner/ownerhome.html";
                }
                else if (data.role === "Buyer") {
                    window.location.href = "/buyer/buyerhome.html";
                }
                else {
                    window.location.href = "/";
                }

            } catch (error) {
                console.error(error);
                alert("Server error");
            }
        }
    </script>


</body>

</html>
