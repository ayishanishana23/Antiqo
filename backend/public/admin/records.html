<!DOCTYPE html>
<html>

<head>
  <title>Admin Records - Antiqo</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: #1c1c1c;
      color: #d4af37;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      height: 50px;
    }

    nav button {
      padding: 10px 18px;
      border: none;
      border-radius: 5px;
      background: #d4af37;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-left: 8px;
    }

    nav button:hover {
      background: #b8962e;
    }

    .hero-bg {
      flex: 1;
      background: url("/images/antique-bg.jpg") no-repeat center/cover;
      position: relative;
      padding: 40px;
      overflow-y: auto;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
    }

    .dashboard {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      color: white;
    }

    .section {
      flex: 1 1 450px;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 10px;
      max-height: 65vh;
      overflow-y: auto;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .section h2 {
      color: #d4af37;
      margin-bottom: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(212, 175, 55, 0.4);
      padding-bottom: 6px;
    }

    .card {
      background: rgba(0, 0, 0, 0.6);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ===== ENHANCED ADMIN LIST CARDS ===== */

    .admin-list-card {
      background: rgba(0, 0, 0, .6);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .admin-list-card img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid #d4af37;
    }

    .admin-list-info {
      flex: 1;
      font-size: 13px;
    }

    .admin-list-info b {
      color: #d4af37;
      font-size: 14px;
    }

    .admin-list-actions {
  display: flex;
  align-items: center;
  min-width: 80px;
  justify-content: flex-end;
}

    .delete {
  background: #555;
  color: white;
  padding: 6px 14px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  min-width: 70px;
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  white-space: nowrap;
}

    footer {
      background: #1c1c1c;
      color: #d4af37;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo"><img src="/images/logo.png"></div>
    <nav>
      <button onclick="goHome()">Dashboard</button>
      <button onclick="logout()">Logout</button>
    </nav>
  </header>

  <div class="hero-bg">
    <div class="overlay"></div>

    <div class="dashboard">

      <div class="section">
        <h2>Approved Users</h2>
        <div id="approvedUsers">Loading...</div>
      </div>

      <div class="section">
        <h2>Verified Antiques</h2>
        <div id="verifiedAntiques">Loading...</div>
      </div>

    </div>
  </div>

  <div id="antiqueModal"
style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999; align-items:center; justify-content:center;">

<div
style="background:#111; padding:20px; border-radius:10px; max-width:520px; width:92%; color:white; border:1px solid #d4af37; max-height:80vh; overflow-y:auto;">

<h2 id="modalTitle" style="color:#d4af37; text-align:center; margin-bottom:10px;"></h2>

<div id="antiqueDetails"></div>

<div style="text-align:center; margin-top:15px;">
<button onclick="closeModal()"
style="padding:8px 18px;background:#d4af37;border:none;border-radius:5px;cursor:pointer;font-weight:bold;">
Close
</button>
</div>

</div>
</div>

  <footer>
    © Antiqo – Antique Verification System | MCA Project
  </footer>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login.html";

    function goHome() {
      window.location.href = "/admin/adminhome.html";
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "/login.html";
    }

    // LOAD APPROVED USERS
    async function loadApprovedUsers() {
      const res = await fetch("/api/admin/approved-users", {
        headers: { Authorization: "Bearer " + token }
      });

      const users = await res.json();
      const container = document.getElementById("approvedUsers");
      container.innerHTML = users.length ? "" : "No approved users";

      users.forEach(u => {
        container.innerHTML += `
      <div class="admin-list-card">
        <div class="admin-list-info">
          <b>${u.name}</b><br>
          Email: ${u.email}<br>
          Role: ${u.role}<br>
          Joined: ${new Date(u.createdAt).toLocaleDateString()}
        </div>
        <div class="admin-list-actions">
          <button class="delete" onclick="deleteUser('${u._id}')">
            Delete
          </button>
        </div>
      </div>
    `;
      });
    }

    async function deleteUser(id) {
      if (!confirm("Delete this user?")) return;
      await fetch("/api/admin/delete-user/" + id, { method: "DELETE", headers: { Authorization: "Bearer " + token } });
      loadApprovedUsers();
    }

    // LOAD VERIFIED ANTIQUES
    async function loadApprovedAntiques() {
      const res = await fetch("/api/admin/approved-antiques", { headers: { Authorization: "Bearer " + token } });
      const antiques = await res.json();
      const container = document.getElementById("verifiedAntiques");
      container.innerHTML = antiques.length ? "" : "No verified antiques";

      antiques.forEach(a => {
        container.innerHTML += `
      <div class="admin-list-card" onclick='showAntiqueDetails(${JSON.stringify(a)})'>
        <img src="${a.imageUrl}" alt="${a.name}">
        <div class="admin-list-info">
          <b>${a.name}</b><br>
          Owner: ${a.owner?.name || "N/A"}<br>
          Owner ID: ${a.owner?._id || "N/A"}<br>
        </div>
        <div class="admin-list-actions">
          <button class="delete" onclick="deleteAntique(event,'${a._id}')">Delete</button>
        </div>
      </div>
    `;
      });
    }

  function showAntiqueDetails(a) {

  document.getElementById("modalTitle").innerText = a.name;

  const container = document.getElementById("antiqueDetails");

  container.innerHTML = `

<div style="display:flex; gap:15px; align-items:center; justify-content:center; margin-bottom:12px; flex-wrap:wrap;">

<img src="${a.imageUrl}"
style="width:170px;height:170px;object-fit:cover;border-radius:8px;border:2px solid #d4af37;">

${a.qrCode ? `
<img src="${a.qrCode}"
style="width:170px;height:170px;background:white;padding:6px;border-radius:6px;">
` : ""}

</div>

<p><b>Description:</b> ${a.description || "N/A"}</p>

<p><b>Owner:</b> ${a.owner?.name || "N/A"}</p>

<p><b>Owner ID:</b> ${a.owner?._id || "N/A"}</p>

<p><b>Blockchain ID:</b> ${a.blockchainId || "N/A"}</p>

<p><b>Transaction Hash:</b><br>
<span style="font-size:12px;word-break:break-all;">
${a.txHash || "N/A"}
</span>
</p>

<p><b>Verified At:</b>
${a.verifiedAt ? new Date(a.verifiedAt).toLocaleString() : "N/A"}
</p>

`;

  document.getElementById("antiqueModal").style.display = "flex";
}
    function closeModal() {
      document.getElementById("antiqueModal").style.display = "none";
    }
async function deleteAntique(event, id) {
  event.stopPropagation(); // prevents modal click
  if (!confirm("Are you sure you want to delete this antique?")) return;

  try {
    const res = await fetch("/api/admin/delete-antique/" + id, {
      method: "DELETE",
      headers: { Authorization: "Bearer " + token }
    });
    const data = await res.json();
    if (!res.ok) alert(data.message);
    else loadApprovedAntiques();
  } catch (err) {
    console.error(err);
    alert("Failed to delete antique");
  }
}

    loadApprovedUsers();
    loadApprovedAntiques();
  </script>

</body>

</html>
